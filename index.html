<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BLOCK 6</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BLOCK6">
<meta name="theme-color" content="#0d0e10">
<link rel="apple-touch-icon" href="icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0b0c0f; --s1:#14161b; --s2:#1e2028;
  --bd:#2a2e3c; --bd2:#363c50;
  --tx:#eef0fa; --tx2:#8892b4; --tx3:#4e566e;
  --ac:#5a70f8; --ov:#e84040; --ok:#22c46e; --so:#e08830;
  --del:#e84040;
  --c0:#9490fa; --c1:#f0b030; --c2:#22e080;
  --c3:#38b0fa; --c4:#f060a8; --c5:#b088fa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg);color:var(--tx);
  font-size:14px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:60;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:46px;
  background:rgba(13,14,16,.97);
  border-bottom:1px solid var(--bd);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.15em;color:var(--tx2);}
.logo b{color:var(--ac);font-weight:500;}
.tabs{display:flex;gap:1px;}
.tab{
  padding:4px 11px;border-radius:6px;border:none;
  background:transparent;color:var(--tx2);
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.tab.on{color:var(--tx);background:var(--s2);}
.hdr-r{display:flex;align-items:center;gap:6px;}
.date-l{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);}

/* 휴지통 버튼 */
.trash-btn{
  position:relative;
  padding:4px 8px;border-radius:6px;
  border:1px solid var(--bd2);background:transparent;
  color:var(--tx3);font-size:13px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:color .15s;
}
.trash-btn:hover{color:var(--tx2);}
.trash-badge{
  position:absolute;top:-3px;right:-3px;
  min-width:14px;height:14px;border-radius:7px;
  background:var(--ov);color:#fff;
  font-size:8px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 3px;display:none;
}
.trash-badge.on{display:flex;}

.ai-b{
  padding:4px 9px;border-radius:6px;
  border:1px solid var(--bd2);background:transparent;color:var(--tx2);
  font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-family:'Pretendard',sans-serif;
}
/* undo/redo — true flat, no box */
.ur-btn{
  background:none;border:none;box-shadow:none;
  color:var(--tx3);font-size:15px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  padding:4px 4px;line-height:1;
  font-family:'DM Mono',monospace;
  transition:color .12s;
  -webkit-appearance:none;appearance:none;
}
.ur-btn:hover:not(:disabled){color:var(--tx);}
.ur-btn:disabled{color:var(--tx3);opacity:.18;cursor:default;}

/* ── PAGE ── */
#todayView{padding:12px 12px 60px;}
#weeklyView,#monthlyView{display:none;padding:14px;}

/* total bar */
.total-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:0 2px;}
.total-prog{flex:1;height:2px;background:var(--bd2);border-radius:1px;}
.total-fill{height:100%;border-radius:1px;background:var(--ac);transition:width .3s;}
.total-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);white-space:nowrap;}
.total-lbl.ov{color:var(--ov);}

/* add hidden section */
.add-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.add-btn{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--bd2);background:transparent;color:var(--tx2);
  font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-family:'Pretendard',sans-serif;transition:color .12s,border-color .12s;
}
.add-btn:hover{color:var(--tx);border-color:var(--bd2);}
.add-dot{width:5px;height:5px;border-radius:50%;}
/* preset buttons: A and ★ */
.preset-btn{
  display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:8px;
  border:1px solid var(--bd2);background:transparent;
  color:var(--tx2);font-size:12px;font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-family:'DM Mono',monospace;transition:all .15s;flex-shrink:0;
}
/* ★ two steps larger, shift up 1px to center optically */
.preset-btn.star-btn{font-size:18px;line-height:1;padding-bottom:2px;}
.preset-btn:hover{border-color:var(--ac);color:var(--ac);}
.preset-btn.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.preset-btn.on:hover{background:var(--ac);}
.preset-sep{width:1px;height:16px;background:var(--bd2);flex-shrink:0;margin:0 2px;}

/* add-btn count — matches section color via inline style */
.add-btn-cnt{
  font-family:'DM Mono',monospace;font-size:10px;
  margin-left:1px;font-weight:600;
}

/* ── TIME SECTION ── */
.ts{margin-bottom:8px;border:1px solid var(--bd);border-radius:12px;background:var(--s1);overflow:hidden;will-change:transform;}
.ts.now{border-color:var(--bd2);}
.ts-hd{
  display:flex;align-items:center;gap:8px;padding:11px 13px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.ts-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ts-name{font-size:13px;font-weight:600;}
.ts-sp{flex:1;}
.ts-rm{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 3px;-webkit-tap-highlight-color:transparent;}
.ts.cl .ts-body{display:none;}
.ts-body{padding:0 10px 10px;}

/* collapsed section summary */
.ts-summary{
  display:none;
  align-items:center;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--tx2);letter-spacing:.02em;
}
.ts.cl .ts-summary{display:flex;}

/* section swiping — lifted feel */
.ts.swiping{
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  border-color:var(--bd2);
  z-index:10;
}

/* drag drop indicator line */
.drop-ind{
  height:2px;border-radius:1px;
  margin:2px 0;pointer-events:none;
  display:none;
}
.drop-ind.show{display:block;}

/* block long-press "press" state before drag activates */
.big-item.pressing,.sm-item.pressing{
  transform:scale(.98);
  transition:transform .15s;
  opacity:.85;
}

/* ── BLOCK SWIPE WRAPPER ── */
.swipe-wrap{
  position:relative;overflow:hidden;border-radius:8px;
  margin-bottom:5px;
}

/* red delete underlay (touch swipe left) */
.del-underlay{
  position:absolute;top:0;right:0;bottom:0;
  width:72px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:16px;
  background:var(--del);border-radius:0 8px 8px 0;
  opacity:0;pointer-events:none;transition:opacity .1s;
}
/* monochrome complete underlay (touch swipe right) */
.chk-underlay{
  position:absolute;top:0;left:0;bottom:0;
  width:72px;display:flex;align-items:center;justify-content:flex-start;
  padding-left:16px;
  background:var(--tx2);border-radius:8px 0 0 8px;
  opacity:0;pointer-events:none;transition:opacity .1s;
}

/* ── BIG BLOCK (E method: colored left bar, no indent) ── */
.big-list{display:flex;flex-direction:column;}

.big-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px 9px 12px;
  background:rgba(90,112,248,.10);
  border:1px solid rgba(90,112,248,.28);
  border-left:3px solid var(--sec-color, var(--ac));
  border-radius:8px;
  touch-action:pan-y;
  user-select:none;-webkit-user-select:none;
  position:relative;
  transition:transform .18s,box-shadow .18s,opacity .18s,border-color .15s;
  will-change:transform;cursor:grab;
}
.big-item.done-st{opacity:.36;}
.big-item.over{background:rgba(232,64,64,.10);border-color:rgba(232,64,64,.32);border-left-color:var(--ov);}
.big-item.drag-active{
  opacity:.9;cursor:grabbing;
  transform:scale(1.03) translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.55),0 2px 6px rgba(0,0,0,.4);
  border-color:rgba(90,112,248,.55);
  z-index:10;
}
.big-item.dov{outline:1.5px solid var(--ac);}

/* hover delete button — desktop only */
.blk-del{
  background:none;border:none;color:var(--tx3);cursor:pointer;
  font-size:14px;padding:2px 4px;flex-shrink:0;
  opacity:0;transition:opacity .12s,color .12s;
  -webkit-tap-highlight-color:transparent;
  line-height:1;
}
.big-item:hover .blk-del,
.sm-item:hover .blk-del{opacity:1;}
.blk-del:hover{color:var(--ov);}
/* always visible on touch devices */
@media(hover:none){.blk-del{opacity:.4;}}

.bi-dh{color:var(--tx3);font-size:11px;flex-shrink:0;cursor:grab;}
.bi-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--tx);font-family:'Pretendard',sans-serif;
  font-size:16px;font-weight:600;min-width:0;-webkit-appearance:none;
}
.bi-inp::placeholder{color:var(--tx3);font-weight:400;font-size:14px;}
/* shared check button — rounded square, same for big and small */
.blk-chk{
  width:15px;height:15px;border-radius:4px;
  border:1.5px solid var(--bd2);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;color:transparent;
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.blk-chk:hover{border-color:var(--tx2);}
.big-item.done-st .blk-chk,
.sm-item.done-st .blk-chk{background:var(--tx2);border-color:var(--tx2);color:var(--bg);}

/* big add ghost */
.big-add{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px 8px 14px;margin-bottom:6px;
  border:1px dashed var(--bd2);border-radius:8px;
}
.big-add:focus-within{border-color:rgba(90,112,248,.4);border-style:solid;}
.ba-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--tx);font-family:'Pretendard',sans-serif;
  font-size:16px;font-weight:600;min-width:0;-webkit-appearance:none;
}
.ba-inp::placeholder{color:var(--tx3);font-weight:400;font-size:14px;}
.ba-icon{font-size:10px;color:var(--tx3);flex-shrink:0;line-height:1;}

.div-line{height:1px;background:var(--bd);margin:6px 0 8px;}

/* ── SMALL BLOCK (E method: 1px left bar, indented, smaller text) ── */
.sm-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding-left:12px;}
.sm-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;color:var(--tx3);text-transform:uppercase;}
.sm-cnt-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);}
.sm-cnt-lbl.ov{color:var(--so);}
.sm-list{display:flex;flex-direction:column;}

.sm-item{
  display:flex;align-items:center;gap:7px;
  padding:7px 9px 7px 12px;
  margin-left:12px; /* indent vs big */
  background:var(--s2);
  border:1px solid var(--bd);
  border-left:1px solid var(--sec-color, var(--tx3)); /* thin colored bar */
  border-radius:7px;
  touch-action:pan-y;
  user-select:none;-webkit-user-select:none;
  position:relative;
  transition:transform .18s,box-shadow .18s,opacity .18s;
  will-change:transform;cursor:grab;
}
.sm-item.done-st{opacity:.32;}
.sm-item.over{border-left-color:var(--so);background:rgba(224,136,48,.06);}
.sm-item.drag-active{
  opacity:.9;cursor:grabbing;
  transform:scale(1.03) translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.55),0 2px 6px rgba(0,0,0,.4);
  border-color:var(--bd2);
  z-index:10;
}
.sm-item.dov{outline:1.5px solid var(--ac);}

.si-dh{color:var(--tx3);font-size:10px;flex-shrink:0;cursor:grab;}
.si-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--tx2); /* slightly dimmer than big */
  font-family:'Pretendard',sans-serif;
  font-size:13px;font-weight:500;min-width:0;-webkit-appearance:none;
}
.si-inp::placeholder{color:var(--tx3);font-weight:400;font-size:12px;}
.over-pip{width:4px;height:4px;border-radius:50%;background:var(--so);flex-shrink:0;}

/* sm inline ghost — always visible at bottom, no + button */
.sm-ghost-inline{
  display:flex;align-items:center;gap:7px;
  padding:6px 9px 6px 12px;
  margin-left:12px;
  border:1px dashed var(--bd);
  border-radius:7px;margin-top:4px;
}
.sm-ghost-inline:focus-within{border-color:var(--bd2);border-style:solid;}
.sgi-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--tx2);font-family:'Pretendard',sans-serif;
  font-size:13px;font-weight:500;min-width:0;-webkit-appearance:none;
}
.sgi-inp::placeholder{color:var(--tx3);font-weight:400;font-size:12px;}

/* drag ghost */
#dg{position:fixed;z-index:9999;pointer-events:none;border-radius:8px;opacity:.88;box-shadow:0 10px 40px rgba(0,0,0,.7);display:none;}

/* ── TRASH PANEL ── */
.trash-panel{
  position:fixed;top:0;right:0;bottom:0;left:0;z-index:80;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.trash-panel.op{opacity:1;pointer-events:all;}
.trash-sheet{
  width:100%;max-width:480px;
  background:var(--s1);border-radius:16px 16px 0 0;
  padding:20px 16px 36px;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:70vh;overflow-y:auto;
}
.trash-panel.op .trash-sheet{transform:translateY(0);}
.trash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.trash-title{font-size:13px;font-weight:600;color:var(--tx2);display:flex;align-items:center;gap:7px;}
.trash-actions{display:flex;gap:8px;}
.trash-clear{
  background:none;border:none;
  color:var(--ov);font-size:11px;cursor:pointer;
  font-family:'Pretendard',sans-serif;-webkit-tap-highlight-color:transparent;
  opacity:.7;
}
.trash-clear:hover{opacity:1;}
.trash-close-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;-webkit-tap-highlight-color:transparent;}
.trash-empty{color:var(--tx3);font-size:13px;text-align:center;padding:24px 0;}
.trash-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  background:var(--s2);border:1px solid var(--bd);
  margin-bottom:6px;
}
.trash-item-info{flex:1;}
.trash-item-text{font-size:13px;font-weight:600;color:var(--tx2);}
.trash-item-meta{font-size:10px;color:var(--tx3);margin-top:2px;font-family:'DM Mono',monospace;}
.trash-type{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bd2);color:var(--tx3);flex-shrink:0;}
.trash-restore{
  background:none;border:none;
  color:var(--tx3);font-size:11px;padding:3px 4px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;font-family:'Pretendard',sans-serif;flex-shrink:0;
}
.trash-restore:hover{color:var(--tx);}

/* ── AI DRAWER ── */
.ai-dr{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--s1);border-top:1px solid var(--bd2);
  padding:14px 16px 28px;
  transform:translateY(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.ai-dr.op{transform:translateY(0);}
.ai-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ai-ttl{font-size:12px;font-weight:600;color:var(--tx2);}
.ai-x{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;}
.ai-row{display:flex;gap:7px;}
.ai-inp{
  flex:1;background:var(--s2);border:1px solid var(--bd2);
  border-radius:7px;padding:9px 11px;
  color:var(--tx);font-family:'Pretendard',sans-serif;font-size:16px;
  outline:none;-webkit-appearance:none;
}
.ai-send{
  padding:9px 14px;border-radius:7px;border:none;
  background:var(--ac);color:#fff;
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.ai-send:disabled{opacity:.4;}
.ai-res{margin-top:9px;font-size:12px;color:var(--tx2);line-height:1.6;}
.ai-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.ai-chip{
  padding:4px 11px;border-radius:20px;
  border:1px solid var(--bd2);background:var(--s2);
  color:var(--tx2);font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.ai-chip.ap{border-color:rgba(45,148,100,.35);color:var(--ok);}

/* ── WEEKLY/MONTHLY ── */
.view-ttl{font-size:16px;font-weight:700;margin-bottom:14px;}
.wscr{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wkg{display:grid;grid-template-columns:48px repeat(7,minmax(68px,1fr));gap:2px;min-width:540px;}
.wh{padding:4px;text-align:center;font-size:9px;font-weight:700;color:var(--tx3);font-family:'DM Mono',monospace;}
.wh.tc{color:var(--ac);}
.wlbl{padding:4px;font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;display:flex;align-items:center;}
.wc{background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:4px 6px;min-height:36px;}
.wc.tc{border-color:rgba(81,101,246,.22);}
.wbig{font-size:11px;font-weight:600;color:var(--ac);line-height:1.4;}
.wbig.done{opacity:.25;}
.wsm{font-size:10px;color:var(--tx2);line-height:1.4;}
.wsm.done{opacity:.25;text-decoration:line-through;}
.wmore{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;}
.mnav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.mnb{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;}
.mttl{font-size:16px;font-weight:700;}
.mcg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mcdow{text-align:center;font-size:8px;font-weight:700;color:var(--tx3);padding:4px 0;font-family:'DM Mono',monospace;}
.mcc{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:5px;min-height:50px;}
.mcc.empty{background:transparent;border-color:transparent;}
.mcc.mct{border-color:rgba(81,101,246,.3);}
.mcd{font-size:9px;font-weight:700;color:var(--tx2);margin-bottom:3px;}
.mcc.mct .mcd{color:var(--ac);}
.mcdots{display:flex;flex-wrap:wrap;gap:2px;}
.mcdot{width:4px;height:4px;border-radius:50%;background:var(--ac);}
.mcdot.ov{background:var(--ov);}.mcdot.dn{opacity:.25;}
.mcsc{font-size:8px;color:var(--tx3);margin-top:2px;font-family:'DM Mono',monospace;}

::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>

<header>
  <div class="logo">BLO<b>CK</b>6</div>
  <div class="tabs">
    <button class="tab on" onclick="sw('today',this)">D</button>
    <button class="tab" onclick="sw('weekly',this)">W</button>
    <button class="tab" onclick="sw('monthly',this)">M</button>
  </div>
  <div class="hdr-r">
    <div class="date-l" id="hDate"></div>
    <button class="ur-btn" id="undoBtn" onclick="doUndo()" title="실행취소" disabled>↩</button>
    <button class="ur-btn" id="redoBtn" onclick="doRedo()" title="다시실행" disabled>↪</button>
    <button class="trash-btn" onclick="openTrash()" title="휴지통">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">

<script>
// ═══════ CONFIG ═══════
const DOW=['일','월','화','수','목','금','토'];
const MONS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const SECS=[
  {id:'dawn',name:'새벽',color:'var(--c0)',def:false},
  {id:'am',  name:'오전',color:'var(--c2)',def:true},
  {id:'morn',name:'점심',color:'var(--c1)',def:false},
  {id:'pm',  name:'오후',color:'var(--c3)',def:true},
  {id:'eve', name:'저녁',color:'var(--c4)',def:false},
  {id:'night',name:'밤', color:'var(--c5)',def:true},
];
const SWIPE_THRESHOLD=72; // px to trigger delete

// ═══════ STATE ═══════
function load(){
  try{const s=localStorage.getItem('b6v7');if(s)return JSON.parse(s);}catch(e){}
  return{vis:['am','pm','night'],prevVis:null,preset:null,collapsed:[],days:{}};
}
const ST=load();
function rawSave(){try{localStorage.setItem('b6v7',JSON.stringify(ST));}catch(e){}}

// ═══════ UNDO / REDO ═══════
const UNDO_STACK=[];
const REDO_STACK=[];
const MAX_UNDO=50;
let _applyingHistory=false;

function snapshot(){
  return JSON.stringify({
    vis:[...ST.vis],
    prevVis:ST.prevVis?[...ST.prevVis]:null,
    preset:ST.preset,
    collapsed:[...(ST.collapsed||[])],
    days:JSON.parse(JSON.stringify(ST.days))
  });
}

// Call BEFORE mutating ST — records pre-mutation state
function beforeSave(){
  if(_applyingHistory)return;
  UNDO_STACK.push(snapshot());
  if(UNDO_STACK.length>MAX_UNDO)UNDO_STACK.shift();
  REDO_STACK.length=0;
  updateUrBtns();
}

// Just persists
function save(){rawSave();updateUrBtns();}

function applySnapshot(snap){
  _applyingHistory=true;
  const s=JSON.parse(snap);
  ST.vis=s.vis;ST.prevVis=s.prevVis;ST.preset=s.preset;
  ST.collapsed=s.collapsed||[];ST.days=s.days;
  rawSave();
  _applyingHistory=false;
  renderToday();
  updateUrBtns();
}

function doUndo(){
  if(!UNDO_STACK.length)return;
  REDO_STACK.push(snapshot()); // save current as redo point
  applySnapshot(UNDO_STACK.pop());
}

function doRedo(){
  if(!REDO_STACK.length)return;
  UNDO_STACK.push(snapshot());
  applySnapshot(REDO_STACK.pop());
}

function updateUrBtns(){
  const u=document.getElementById('undoBtn');
  const r=document.getElementById('redoBtn');
  if(u)u.disabled=UNDO_STACK.length===0;
  if(r)r.disabled=REDO_STACK.length===0;
}

// Debounced capture for text edits — snapshot before first keystroke, debounce reset
let _textSnapTimer=null;
let _textSnapTaken=false;
function saveText(){
  if(!_applyingHistory&&!_textSnapTaken){
    // Take pre-edit snapshot on first keystroke
    UNDO_STACK.push(snapshot());
    if(UNDO_STACK.length>MAX_UNDO)UNDO_STACK.shift();
    REDO_STACK.length=0;
    _textSnapTaken=true;
    updateUrBtns();
  }
  rawSave();
  // Reset after 1.5s of no typing so next edit session gets its own snapshot
  clearTimeout(_textSnapTimer);
  _textSnapTimer=setTimeout(()=>{_textSnapTaken=false;},1500);
}
function tKey(){const d=new Date();return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;}
function z(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getDay(k){if(!ST.days[k])ST.days[k]={big:{},small:{},trash:[]};if(!ST.days[k].trash)ST.days[k].trash=[];return ST.days[k];}
function getBigs(k,id){const d=getDay(k);if(!d.big[id])d.big[id]=[];return d.big[id];}
function getSmalls(k,id){const d=getDay(k);if(!d.small[id])d.small[id]=[];return d.small[id];}
function getTrash(k){return getDay(k).trash;}

function totalBigCount(k){
  return SECS.reduce((a,s)=>a+(getBigs(k,s.id).filter(b=>b.text?.trim()).length),0);
}

let mCur={y:new Date().getFullYear(),m:new Date().getMonth()};

// ═══════ TRASH ═══════
function sendToTrash(k,type,secId,item){
  const sec=SECS.find(s=>s.id===secId);
  getTrash(k).unshift({
    type,secId,secName:sec?.name||'',
    text:item.text,done:item.done,
    ts:Date.now()
  });
  rawSave();updateTrashBadge();
}

function updateTrashBadge(){
  const k=tKey();const n=getTrash(k).length;
  const badge=document.getElementById('trashBadge');
  badge.textContent=n>9?'9+':n||'';
  badge.className='trash-badge'+(n>0?' on':'');
}

function openTrash(){
  renderTrashList();
  document.getElementById('trashPanel').classList.add('op');
}
function closeTrash(){document.getElementById('trashPanel').classList.remove('op');}
function trashBgClick(e){if(e.target===document.getElementById('trashPanel'))closeTrash();}

function renderTrashList(){
  const k=tKey();const trash=getTrash(k);
  const list=document.getElementById('trashList');
  if(trash.length===0){list.innerHTML='<div class="trash-empty">비어있어요</div>';return;}
  list.innerHTML='';
  trash.forEach((item,i)=>{
    const row=document.createElement('div');row.className='trash-item';
    const info=document.createElement('div');info.className='trash-item-info';
    const txt=document.createElement('div');txt.className='trash-item-text';txt.textContent=item.text;
    const meta=document.createElement('div');meta.className='trash-item-meta';
    meta.textContent=`${item.secName} · ${item.type==='big'?'빅':'스몰'}`;
    info.append(txt,meta);
    const typeLbl=document.createElement('span');typeLbl.className='trash-type';
    typeLbl.textContent=item.type==='big'?'빅':'스몰';
    const restoreBtn=document.createElement('button');restoreBtn.className='trash-restore';
    restoreBtn.textContent='복원';
    restoreBtn.onclick=()=>restoreFromTrash(i);
    row.append(info,typeLbl,restoreBtn);
    list.appendChild(row);
  });
}

function restoreFromTrash(i){
  const k=tKey();const trash=getTrash(k);
  beforeSave();
  const item=trash.splice(i,1)[0];
  if(item.type==='big'){
    getBigs(k,item.secId).push({text:item.text,done:item.done});
  } else {
    getSmalls(k,item.secId).push({text:item.text,done:item.done});
  }
  save();updateTrashBadge();renderTrashList();renderSecBody(item.secId);updateTotal();
}

function clearTrash(){
  const k=tKey();beforeSave();getDay(k).trash=[];
  save();updateTrashBadge();renderTrashList();
}

// ═══════ TABS ═══════
function sw(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['todayView','weeklyView','monthlyView'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(t+'View').style.display='block';
  if(t==='today')renderToday();
  if(t==='weekly')renderWeekly();
  if(t==='monthly')renderMonthly();
}

// ═══════ TODAY ═══════
function renderToday(){renderAddRow();renderSecs();updateTotal();updateTrashBadge();}

function renderAddRow(){
  const row=document.getElementById('addRow');row.innerHTML='';
  row.style.display='flex';

  const allIds=SECS.map(s=>s.id);
  const defIds=['am','pm','night'];
  const isAllOn=ST.preset==='all';
  const isStarOn=ST.preset==='star';

  // A button — toggle all 6
  const btnA=document.createElement('button');
  btnA.className='preset-btn'+(isAllOn?' on':'');
  btnA.title=isAllOn?'이전 보기로':'전체 펼치기';
  btnA.textContent='A';
  btnA.onclick=()=>{
    beforeSave();
    if(isAllOn){
      ST.vis=ST.prevVis||defIds;ST.preset=null;ST.prevVis=null;
    } else {
      ST.prevVis=[...ST.vis];ST.preset='all';ST.vis=[...allIds];
    }
    ST.collapsed=[];
    save();renderToday();
  };
  row.appendChild(btnA);

  // ★ button — toggle default 3
  const btnStar=document.createElement('button');
  btnStar.className='preset-btn star-btn'+(isStarOn?' on':'');
  btnStar.title=isStarOn?'이전 보기로':'기본 3개';
  btnStar.textContent='★';
  btnStar.onclick=()=>{
    beforeSave();
    if(isStarOn){
      ST.vis=ST.prevVis||defIds;ST.preset=null;ST.prevVis=null;
    } else {
      ST.prevVis=[...ST.vis];ST.preset='star';ST.vis=[...defIds];
    }
    ST.collapsed=[];
    save();renderToday();
  };
  row.appendChild(btnStar);

  // separator
  const sep=document.createElement('div');sep.className='preset-sep';row.appendChild(sep);

  // individual hidden section buttons — name + count in section color
  const k=tKey();
  const hidden=SECS.filter(s=>!ST.vis.includes(s.id));
  hidden.forEach(sec=>{
    const bigPending=getBigs(k,sec.id).filter(b=>b.text?.trim()&&!b.done).length;
    const smPending=getSmalls(k,sec.id).filter(s=>s.text?.trim()&&!s.done).length;
    const hasPending=bigPending>0||smPending>0;
    // resolve CSS var to actual hex for inline style
    const colorMap={'var(--c0)':'#9490fa','var(--c1)':'#f0b030','var(--c2)':'#22e080',
      'var(--c3)':'#38b0fa','var(--c4)':'#f060a8','var(--c5)':'#b088fa'};
    const resolvedColor=colorMap[sec.color]||'#8892b4';

    const btn=document.createElement('button');btn.className='add-btn';
    const dot=document.createElement('span');dot.className='add-dot';dot.style.background=resolvedColor;
    const nameSpan=document.createElement('span');nameSpan.textContent=sec.name;
    nameSpan.style.color=resolvedColor;
    btn.append(dot,nameSpan);
    if(hasPending){
      const cnt=document.createElement('span');cnt.className='add-btn-cnt';
      cnt.textContent=`${bigPending}/${smPending}`;
      cnt.style.color=resolvedColor;
      btn.appendChild(cnt);
    }
    btn.onclick=()=>{
      beforeSave();
      ST.preset=null;ST.prevVis=null;
      ST.vis.push(sec.id);
      ST.vis.sort((a,b)=>SECS.findIndex(s=>s.id===a)-SECS.findIndex(s=>s.id===b));
      save();renderToday();
    };
    row.appendChild(btn);
  });
}

function curSecId(){
  const h=new Date().getHours();
  if(h>=4&&h<7)return'dawn';if(h>=7&&h<10)return'morn';
  if(h>=10&&h<13)return'am';if(h>=13&&h<17)return'pm';
  if(h>=17&&h<21)return'eve';return'night';
}

// ═══════ HEADER SWIPE (swipe-left to hide section) ═══════
function attachHdSwipe(trigger, ts, onHide, excludeInputs=false){
  const THRESHOLD=80;
  let startX=0,startY=0,curX=0,swiping=false,touchId=null,decided=false;

  trigger.addEventListener('touchstart',e=>{
    if(excludeInputs&&e.target.closest('input,textarea,button'))return;
    const t=e.touches[0];
    touchId=t.identifier;startX=t.clientX;startY=t.clientY;
    curX=0;swiping=false;decided=false;
  },{passive:true});

  trigger.addEventListener('touchmove',e=>{
    let t=null;
    for(let i=0;i<e.touches.length;i++){if(e.touches[i].identifier===touchId){t=e.touches[i];break;}}
    if(!t)return;
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(!decided){
      if(Math.abs(dx)<6&&Math.abs(dy)<6)return; // not moved enough yet
      decided=true;
      if(Math.abs(dy)>Math.abs(dx)+6){
        // vertical — let scroll happen, bail
        swiping=false;return;
      }
      if(dx<0){
        // horizontal left — this is our gesture
        swiping=true;
        // prevent input from gaining focus (was touched but not tapped)
        if(document.activeElement&&trigger.contains(document.activeElement)){
          document.activeElement.blur();
        }
      } else {
        // right swipe — ignore
        swiping=false;return;
      }
    }
    if(!swiping)return;
    e.preventDefault();
    curX=Math.max(dx,-THRESHOLD*1.4);
    ts.classList.add('swiping');
    ts.style.transform=`translateX(${curX}px)`;
    ts.style.opacity=String(1-Math.abs(curX)/THRESHOLD*0.5);
  },{passive:false});

  trigger.addEventListener('touchend',e=>{
    ts.classList.remove('swiping');
    if(!swiping){ts.style.transform='';ts.style.opacity='';return;}
    if(Math.abs(curX)>=THRESHOLD){
      ts.style.transition='transform .18s,opacity .18s';
      ts.style.transform=`translateX(-110%)`;
      ts.style.opacity='0';
      setTimeout(()=>{
        ts.style.transition='';ts.style.transform='';ts.style.opacity='';
        onHide();
      },180);
    } else {
      ts.style.transition='transform .2s,opacity .2s';
      ts.style.transform='';ts.style.opacity='';
      setTimeout(()=>ts.style.transition='',200);
    }
    swiping=false;curX=0;decided=false;
  },{passive:true});
}

function renderSecs(){
  const list=document.getElementById('secList');list.innerHTML='';
  const k=tKey();

  SECS.filter(s=>ST.vis.includes(s.id)).forEach(sec=>{
    const ts=document.createElement('div');
    if(!ST.collapsed)ST.collapsed=[];
    const startCollapsed=ST.collapsed.includes(sec.id);
    ts.className='ts'+(startCollapsed?' cl':'');
    ts.id=`ts-${sec.id}`;

    const hd=document.createElement('div');hd.className='ts-hd';
    const dot=document.createElement('div');dot.className='ts-dot';dot.style.background=sec.color;
    const name=document.createElement('span');name.className='ts-name';name.textContent=sec.name;
    const sp=document.createElement('span');sp.className='ts-sp';
    const sumEl=document.createElement('span');sumEl.className='ts-summary';sumEl.id=`tsum-${sec.id}`;

    const rm=document.createElement('button');rm.className='ts-rm';rm.textContent='−';rm.title='숨기기';
    rm.onclick=e=>{
      e.stopPropagation();
      beforeSave();
      ST.preset=null;ST.prevVis=null;
      ST.vis=ST.vis.filter(i=>i!==sec.id);
      ST.collapsed=(ST.collapsed||[]).filter(i=>i!==sec.id);
      save();renderToday();
    };

    // header click toggles collapse — saves to ST
    hd.append(dot,name,sp,sumEl,rm);
    hd.onclick=e=>{
      if(e.target===rm)return;
      beforeSave();
      const isNowCollapsed=ts.classList.toggle('cl');
      if(!ST.collapsed)ST.collapsed=[];
      if(isNowCollapsed){
        if(!ST.collapsed.includes(sec.id))ST.collapsed.push(sec.id);
      } else {
        ST.collapsed=ST.collapsed.filter(i=>i!==sec.id);
      }
      save();
      updateSecSummary(sec.id);
    };

    // swipe-left on header → hide entire section
    const hideSection=()=>{
      beforeSave();
      ST.preset=null;ST.prevVis=null;
      ST.vis=ST.vis.filter(i=>i!==sec.id);
      ST.collapsed=(ST.collapsed||[]).filter(i=>i!==sec.id);
      save();renderToday();
    };
    attachHdSwipe(hd, ts, hideSection, false);

    const body=document.createElement('div');body.className='ts-body';body.id=`tb-${sec.id}`;
    ts.append(hd,body);list.appendChild(ts);
    renderSecBody(sec.id);
    updateSecSummary(sec.id);

    // swipe only on ghost (empty input) areas, not on existing task rows
    // attached inside renderSecBody after ghosts are created
  });
}

function updateSecSummary(id){
  const el=document.getElementById(`tsum-${id}`);if(!el)return;
  const k=tKey();
  const bigCount=getBigs(k,id).filter(b=>b.text?.trim()&&!b.done).length;
  const smCount=getSmalls(k,id).filter(s=>s.text?.trim()&&!s.done).length;
  if(bigCount===0&&smCount===0){el.textContent='';return;}
  el.textContent=`${bigCount}/${smCount}`;
}

function renderSecBody(id){
  const tb=document.getElementById(`tb-${id}`);if(!tb)return;
  tb.innerHTML='';
  const k=tKey();
  const sec=SECS.find(s=>s.id===id);
  const secColor=sec?.color||'var(--ac)';
  tb.style.setProperty('--sec-color', secColor);
  // ts element for section swipe-hide
  const ts=document.getElementById(`ts-${id}`);

  // big list
  const bigList=document.createElement('div');bigList.className='big-list';bigList.id=`bl-${id}`;
  getBigs(k,id).forEach((b,i)=>bigList.appendChild(makeBigWrap(id,i,b,secColor)));
  tb.appendChild(bigList);

  // big add ghost — attach section swipe (empty input area → hide section)
  const ba=makeBigGhost(id,secColor);tb.appendChild(ba);
  if(ts){
    attachHdSwipe(ba,ts,()=>{
      beforeSave();
      ST.preset=null;ST.prevVis=null;
      ST.vis=ST.vis.filter(v=>v!==id);
      ST.collapsed=(ST.collapsed||[]).filter(v=>v!==id);
      save();renderToday();
    },false);
  }

  // divider
  const dv=document.createElement('div');dv.className='div-line';tb.appendChild(dv);

  const smList=document.createElement('div');smList.className='sm-list';smList.id=`sl-${id}`;
  getSmalls(k,id).forEach((sm,i)=>smList.appendChild(makeSmWrap(id,i,sm,secColor)));
  tb.appendChild(smList);

  // inline sm ghost — attach section swipe
  const smGhost=makeSmInlineGhost(id,secColor);
  tb.appendChild(smGhost);
  if(ts){
    attachHdSwipe(smGhost,ts,()=>{
      beforeSave();
      ST.preset=null;ST.prevVis=null;
      ST.vis=ST.vis.filter(v=>v!==id);
      ST.collapsed=(ST.collapsed||[]).filter(v=>v!==id);
      save();renderToday();
    },false);
  }
}

// ═══════ SWIPE-TO-DELETE / SWIPE-TO-COMPLETE ═══════
function makeSwipeWrap(innerEl, onDelete, onComplete){
  const wrap=document.createElement('div');wrap.className='swipe-wrap';

  // left underlay — delete (red)
  const delUnder=document.createElement('div');delUnder.className='del-underlay';
  delUnder.innerHTML=`<svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3.5h10M5 3.5V2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v1M11.5 3.5l-.7 7.5a.5.5 0 0 1-.5.5H3.7a.5.5 0 0 1-.5-.5l-.7-7.5"/>
    <line x1="5.5" y1="6" x2="5.5" y2="9.5"/><line x1="8.5" y1="6" x2="8.5" y2="9.5"/>
  </svg>`;

  // right underlay — complete (monochrome check)
  const chkUnder=document.createElement('div');chkUnder.className='chk-underlay';
  chkUnder.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3,8 6.5,12 13,4"/>
  </svg>`;

  wrap.append(chkUnder, delUnder, innerEl);

  let startX=0,startY=0,curX=0,dir=0,swiping=false,confirmed=false,touchId=null;
  const THRESHOLD=SWIPE_THRESHOLD;

  function onTouchStart(e){
    if(DR.active)return;
    const t=e.touches[0];
    touchId=t.identifier;startX=t.clientX;startY=t.clientY;
    curX=0;dir=0;swiping=false;confirmed=false;
    delUnder.style.opacity='0';chkUnder.style.opacity='0';
  }
  function onTouchMove(e){
    if(DR.active)return; // long-press drag took over
    let t=null;
    for(let i=0;i<e.touches.length;i++){if(e.touches[i].identifier===touchId){t=e.touches[i];break;}}
    if(!t)return;
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(!swiping){
      if(Math.abs(dy)>Math.abs(dx)+4)return;
      if(Math.abs(dx)>6){swiping=true;dir=dx>0?1:-1;}else return;
    }
    // lock direction
    if(dir===1&&dx<0)return;
    if(dir===-1&&dx>0){innerEl.style.transform='';delUnder.style.opacity='0';return;}
    e.preventDefault();
    if(dir===1){
      // right → complete
      curX=Math.min(dx,THRESHOLD*1.3);
      innerEl.style.transform=`translateX(${curX}px)`;
      const prog=Math.min(curX/THRESHOLD,1);
      chkUnder.style.opacity=String(prog);
      confirmed=curX>=THRESHOLD;
    } else {
      // left → delete
      curX=Math.max(dx,-THRESHOLD*1.3);
      innerEl.style.transform=`translateX(${curX}px)`;
      const prog=Math.min(Math.abs(curX)/THRESHOLD,1);
      delUnder.style.opacity=String(prog);
      confirmed=Math.abs(curX)>=THRESHOLD;
    }
  }
  function onTouchEnd(e){
    if(!swiping){
      innerEl.style.transform='';delUnder.style.opacity='0';chkUnder.style.opacity='0';return;
    }
    if(confirmed){
      if(dir===1){
        // complete: flash then callback
        innerEl.style.transition='transform .15s,opacity .15s';
        innerEl.style.transform=`translateX(${THRESHOLD*1.3}px)`;
        innerEl.style.opacity='0.3';
        setTimeout(()=>{
          innerEl.style.transition='';innerEl.style.transform='';innerEl.style.opacity='';
          chkUnder.style.opacity='0';
          onComplete();
        },150);
      } else {
        // delete: slide out
        innerEl.style.transition='transform .18s';
        innerEl.style.transform=`translateX(-100%)`;
        delUnder.style.opacity='1';
        setTimeout(()=>{innerEl.style.transition='';onDelete();},180);
      }
    } else {
      innerEl.style.transition='transform .2s';
      innerEl.style.transform='';
      delUnder.style.opacity='0';chkUnder.style.opacity='0';
      setTimeout(()=>innerEl.style.transition='',200);
    }
    swiping=false;curX=0;confirmed=false;dir=0;
  }

  innerEl.addEventListener('touchstart',onTouchStart,{passive:true});
  innerEl.addEventListener('touchmove',onTouchMove,{passive:false});
  innerEl.addEventListener('touchend',onTouchEnd,{passive:true});

  return wrap;
}

function makeBigGhost(id,secColor){
  const ba=document.createElement('div');ba.className='big-add';ba.id=`ba-${id}`;
  if(secColor)ba.style.setProperty('--sec-color',secColor);
  const icon=document.createElement('span');icon.className='ba-icon';icon.textContent='+';

  inp.type='text';inp.className='ba-inp';
  inp.setAttribute('inputmode','text');inp.setAttribute('enterkeyhint','next');
  let buf='';
  let justEntered=false; // flag: entered via Enter key, skip blur re-render
  inp.oninput=()=>{buf=inp.value;};
  inp.onblur=()=>{
    if(justEntered){justEntered=false;return;} // iOS fires blur after enter — skip
    const v=(buf||inp.value).trim();
    if(v){
      beforeSave();getBigs(tKey(),id).push({text:v,done:false});
      save();inp.value='';buf='';
      renderSecBody(id);updateTotal();
      setTimeout(()=>document.querySelector(`#ba-${id} .ba-inp`)?.focus(),30);
    }
  };
  inp.onkeydown=e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const v=(buf||inp.value).trim();if(!v)return;
      justEntered=true;
      beforeSave();getBigs(tKey(),id).push({text:v,done:false});
      save();updateTotal();updateSecSummary(id);
      // Instead of full re-render: inject new big item into DOM directly, clear input
      inp.value='';buf='';
      // Re-render just the big list portion to show new item, then re-focus ghost
      const bigList=document.getElementById(`bl-${id}`);
      if(bigList){
        const k=tKey();
        bigList.innerHTML='';
        const sec=SECS.find(s=>s.id===id);
        const sc=sec?.color||'var(--ac)';
        getBigs(k,id).forEach((b,ii)=>bigList.appendChild(makeBigWrap(id,ii,b,sc)));
      }
      // Focus ghost input (this element is still in DOM)
      setTimeout(()=>inp.focus(),20);
      justEntered=false; // reset flag after focus
    }
  };
  inp.onclick=e=>e.stopPropagation();
  ba.append(icon,inp);
  return ba;
}

function updateTotal(){
  const k=tKey();
  const all=SECS.flatMap(s=>getBigs(k,s.id)).filter(b=>b.text?.trim());

  if(lbl){lbl.textContent=`${done} / ${tot}`;lbl.className='total-lbl'+(ov?' ov':'');}
  // update all collapsed section summaries
  SECS.forEach(s=>updateSecSummary(s.id));
}

// ═══════ DRAG (cross-section) ═══════
const DR={active:false,type:null,fromId:null,fromI:null,el:null,wrap:null,offX:0,offY:0};

function attachDrag(el,type,i,id){
  const dh=el.querySelector('.bi-dh,.si-dh');
  const LONG_PRESS=280; // ms

  function start(cx,cy){
    const r=el.getBoundingClientRect();
    Object.assign(DR,{active:true,type,fromId:id,fromI:i,el,offX:cx-r.left,offY:cy-r.top});
    const g=document.getElementById('dg');g.innerHTML='';
    const cl=el.cloneNode(true);cl.style.cssText=`width:${r.width}px;pointer-events:none;margin:0;`;
    g.appendChild(cl);
    g.style.cssText=`display:block;width:${r.width}px;left:${cx-DR.offX}px;top:${cy-DR.offY}px;`;
    el.classList.add('drag-active');
    document.body.style.userSelect='none';document.body.style.webkitUserSelect='none';
    // haptic feedback if available
    if(navigator.vibrate)navigator.vibrate(30);
  }

  // ── Desktop: drag handle mousedown ──
  if(dh){
    dh.addEventListener('mousedown',e=>{e.preventDefault();start(e.clientX,e.clientY);});
  }

  // ── Mobile: long-press anywhere on element (including input/button areas) ──
  let pressTimer=null;
  let pressStartX=0,pressStartY=0;

  el.addEventListener('touchstart',e=>{
    // buttons that are purely action (chk, del) should still work normally on tap
    // but we still start the long-press timer everywhere
    const t=e.touches[0];
    pressStartX=t.clientX;pressStartY=t.clientY;
    el.classList.add('pressing');

    pressTimer=setTimeout(()=>{
      pressTimer=null;
      el.classList.remove('pressing');
      // blur any focused input so keyboard dismisses
      if(document.activeElement&&el.contains(document.activeElement)){
        document.activeElement.blur();
      }
      start(pressStartX,pressStartY);
      DR._suppressSwipe=true;
    },LONG_PRESS);
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    if(pressTimer){
      const t=e.touches[0];
      const dx=t.clientX-pressStartX,dy=t.clientY-pressStartY;
      if(Math.abs(dx)>8||Math.abs(dy)>8){
        clearTimeout(pressTimer);pressTimer=null;
        el.classList.remove('pressing');
      }
    }
  },{passive:true});

  el.addEventListener('touchend',e=>{
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
    el.classList.remove('pressing');
  },{passive:true});

  el.addEventListener('touchcancel',e=>{
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
    el.classList.remove('pressing');
  },{passive:true});
}

// ─── Drop target: closest-item snap (no fallback flicker) ───
let _stableDt=null;
let _stableY=0;
const HYST=14;

function getDropTarget(cx,cy){
  try{
    const k=tKey();

    // Find which ts-body we're over first
    let targetTb=null;
    for(const tb of document.querySelectorAll('.ts-body')){
      const r=tb.getBoundingClientRect();
      if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){targetTb=tb;break;}
    }
    if(!targetTb)return null;

    const toId=targetTb.id.replace('tb-','');
    const color=getSecColor(toId);
    const bigList=document.getElementById(`bl-${toId}`);
    const smList=document.getElementById(`sl-${toId}`);

    // Gather all candidate items (big + small) with their rects, sorted by Y
    const candidates=[];

    if(bigList){
      for(const bigItem of bigList.querySelectorAll('.big-item')){
        if(bigItem.classList.contains('drag-active'))continue; // check item, not wrap
        const wrap=bigItem.closest('.swipe-wrap')||bigItem;
        const r=wrap.getBoundingClientRect();
        candidates.push({type:'big',item:bigItem,wrap,r,
          idx:parseInt(bigItem.dataset.i)||0,list:bigList});
      }
    }
    if(smList){
      for(const smItem of smList.querySelectorAll('.sm-item')){
        if(smItem.classList.contains('drag-active'))continue; // check item, not wrap
        const wrap=smItem.closest('.swipe-wrap')||smItem;
        const r=wrap.getBoundingClientRect();
        candidates.push({type:'small',item:smItem,wrap,r,
          idx:parseInt(smItem.dataset.i)||0,list:smList});
      }
    }

    // ── Zone split: use div-line top as big/small boundary ──
    // div-line is always rendered between big-add and sm-list
    const divLineEl=targetTb.querySelector('.div-line');
    const inSmallZone=divLineEl ? cy > divLineEl.getBoundingClientRect().top : false;

    // ── Big zone (cursor above div-line) ──
    if(!inSmallZone&&bigList){
      const bigCandidates=candidates.filter(c=>c.type==='big');
      if(bigCandidates.length===0){
        // Empty big list — drop at index 0
        return{toId,type:'big',toI:0,beforeEl:null,parent:bigList,color};
      }
      // Find closest big candidate
      let bestI=0,bestD=Infinity;
      for(let i=0;i<bigCandidates.length;i++){
        const mid=bigCandidates[i].r.top+bigCandidates[i].r.height/2;
        const d=Math.abs(cy-mid);
        if(d<bestD){bestD=d;bestI=i;}
      }
      const best=bigCandidates[bestI];
      const after=cy>best.r.top+best.r.height/2;
      const toI=best.idx+(after?1:0);
      let beforeEl=null;
      if(!after){
        if(best.list.contains(best.wrap))beforeEl=best.wrap;
      } else {
        for(let i=bestI+1;i<bigCandidates.length;i++){
          if(bigCandidates[i].list===best.list){
            if(best.list.contains(bigCandidates[i].wrap))beforeEl=bigCandidates[i].wrap;
            break;
          }
        }
      }
      return{toId,type:'big',toI,beforeEl,parent:bigList,color};
    }

    if(inSmallZone&&smList){
      // Build small-only candidates
      const smCandidates=candidates.filter(c=>c.type==='small');
      if(smCandidates.length===0){
        // Empty small list — drop at index 0
        return{toId,type:'small',toI:0,beforeEl:null,parent:smList,color};
      }
      // Find closest small candidate
      let bestI=0,bestD=Infinity;
      for(let i=0;i<smCandidates.length;i++){
        const mid=smCandidates[i].r.top+smCandidates[i].r.height/2;
        const d=Math.abs(cy-mid);
        if(d<bestD){bestD=d;bestI=i;}
      }
      const best=smCandidates[bestI];
      const after=cy>best.r.top+best.r.height/2;
      const toI=best.idx+(after?1:0);
      let beforeEl=null;
      if(!after){
        if(best.list.contains(best.wrap))beforeEl=best.wrap;
      } else {
        for(let i=bestI+1;i<smCandidates.length;i++){
          if(smCandidates[i].list===best.list){
            if(best.list.contains(smCandidates[i].wrap))beforeEl=smCandidates[i].wrap;
            break;
          }
        }
      }
      return{toId,type:'small',toI,beforeEl,parent:smList,color};
    }

    if(candidates.length===0){
      if(smList)return{toId,type:'small',toI:0,beforeEl:null,parent:smList,color};
      if(bigList)return{toId,type:'big',toI:0,beforeEl:null,parent:bigList,color};
      return null;
    }

    // Sort by vertical position
    candidates.sort((a,b)=>a.r.top-b.r.top);

    // Find closest candidate by vertical distance to item center
    // — but also check if cursor is clearly below all candidates → drop at end
    const lastC=candidates[candidates.length-1];
    const firstC=candidates[0];

    // If cursor is well below the last item, snap to end of its list
    if(cy>lastC.r.bottom+4){
      return{toId,type:lastC.type,toI:lastC.idx+1,
        beforeEl:null,parent:lastC.list,color};
    }
    // If cursor is well above the first item, snap to start of its list
    if(cy<firstC.r.top-4){
      return{toId,type:firstC.type,toI:0,
        beforeEl:firstC.list.contains(firstC.wrap)?firstC.wrap:null,
        parent:firstC.list,color};
    }

    // Find closest candidate by vertical distance to item center
    let bestIdx=0,bestDist=Infinity;
    for(let ci=0;ci<candidates.length;ci++){
      const c=candidates[ci];
      const mid=c.r.top+c.r.height/2;
      const dist=Math.abs(cy-mid);
      if(dist<bestDist){bestDist=dist;bestIdx=ci;}
    }
    const best=candidates[bestIdx];

    // Snap above or below best candidate
    const after=cy>best.r.top+best.r.height/2;
    const toI=best.idx+(after?1:0);

    // beforeEl: use the wrap of the NEXT candidate in sorted order (same list),
    // not nextElementSibling (which may be drop-ind or other elements)
    let beforeEl=null;
    if(!after){
      // Insert before best → beforeEl = best.wrap (if in same list)
      if(best.list.contains(best.wrap))beforeEl=best.wrap;
    } else {
      // Insert after best → find next candidate in same list
      let nextWrap=null;
      for(let ci=bestIdx+1;ci<candidates.length;ci++){
        if(candidates[ci].list===best.list){
          nextWrap=candidates[ci].wrap;break;
        }
      }
      // nextWrap is null → insert at end of list (appendChild), that's fine
      if(nextWrap&&best.list.contains(nextWrap))beforeEl=nextWrap;
    }

    return{toId,type:best.type,toI,beforeEl,parent:best.list,color};

  }catch(e){return null;}
}

function getStableDt(cx,cy){
  const dt=getDropTarget(cx,cy);
  if(!dt){_stableDt=null;return null;}
  if(_stableDt&&
     _stableDt.toId===dt.toId&&
     _stableDt.type===dt.type&&
     _stableDt.toI===dt.toI&&
     Math.abs(cy-_stableY)<HYST){
    return _stableDt;
  }
  _stableDt=dt;_stableY=cy;
  return dt;
}

function moveG(cx,cy){
  try{
    const g=document.getElementById('dg');
    if(g){g.style.left=(cx-DR.offX)+'px';g.style.top=(cy-DR.offY)+'px';}
    const dt=getStableDt(cx,cy);
    if(dt&&dt.parent){showDropIndicator(dt.beforeEl,dt.parent,dt.color);}
    else clearDropIndicators();
  }catch(e){clearDropIndicators();}
}

function endDrag(cx,cy){
  if(!DR.active)return;
  _stableDt=null;_stableY=0;
  try{
    document.getElementById('dg').style.display='none';
    DR.el?.classList.remove('drag-active');
    document.querySelectorAll('.dov,.drop-target').forEach(e=>{e.classList.remove('dov');e.classList.remove('drop-target');});
    clearDropIndicators();
    document.body.style.userSelect='';document.body.style.webkitUserSelect='';

    // Use non-stabilized target for drop (most accurate at finger-up position)
    const dt=getDropTarget(cx,cy);
    if(dt){
      const k=tKey();beforeSave();
      let item;
      if(DR.type==='big'){item={...getBigs(k,DR.fromId).splice(DR.fromI,1)[0]};}
      else{item={...getSmalls(k,DR.fromId).splice(DR.fromI,1)[0]};}
      let toI=dt.toI;
      if(dt.type==='big'){
        const arr=getBigs(k,dt.toId);
        // Only adjust index if moving within same section of same type
        if(DR.fromId===dt.toId&&DR.type==='big'&&toI>DR.fromI)toI--;
        arr.splice(Math.max(0,Math.min(toI,arr.length)),0,{text:item.text||'',done:!!item.done});
      } else {
        const arr=getSmalls(k,dt.toId);
        // Only adjust index if moving within same section of same type
        if(DR.fromId===dt.toId&&DR.type==='small'&&toI>DR.fromI)toI--;
        arr.splice(Math.max(0,Math.min(toI,arr.length)),0,{text:item.text||'',done:!!item.done});
      }
      save();
      new Set([DR.fromId,dt.toId]).forEach(id=>renderSecBody(id));
      updateTotal();
    }
  }catch(e){
    document.body.style.userSelect='';document.body.style.webkitUserSelect='';
    clearDropIndicators();try{renderSecBody(DR.fromId);}catch(e2){}
  }
  DR.active=false;
}

document.addEventListener('mousemove',e=>{
  if(!DR.active)return;moveG(e.clientX,e.clientY);
});
document.addEventListener('mouseup',e=>endDrag(e.clientX,e.clientY));

document.addEventListener('touchmove',e=>{
  if(!DR.active)return;
  e.preventDefault();
  const t=e.touches[0];moveG(t.clientX,t.clientY);
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!DR.active)return;
  const t=e.changedTouches[0];endDrag(t.clientX,t.clientY);
  DR._suppressSwipe=false;
});

// ═══════ AI ═══════
let aiOpen=false;
function toggleAI(){aiOpen=!aiOpen;document.getElementById('aiDr').classList.toggle('op',aiOpen);if(aiOpen)setTimeout(()=>document.getElementById('aiIn')?.focus(),240);}
async function askAI(){
  const v=document.getElementById('aiIn').value.trim();if(!v)return;
  const res=document.getElementById('aiRes'),chips=document.getElementById('aiChips'),btn=document.getElementById('aiBtn');
  res.textContent='...';chips.innerHTML='';btn.disabled=true;
  const vis=SECS.filter(s=>ST.vis.includes(s.id));
  const prompt=`BLOCK6 코치. 시간대별 빅블럭 키워드(2~5글자 한국어) 제안. 시간대: ${vis.map(s=>s.name).join(',')}. 오늘: "${v}". JSON만: {"blocks":{"${vis.map(s=>s.id).join('":"k","')}":"k"}}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const txt=data.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const blocks=JSON.parse(txt).blocks||{};
    res.textContent='탭해서 적용';chips.innerHTML='';
    const all=document.createElement('button');all.className='ai-chip';
    all.style.cssText='border-color:rgba(81,101,246,.4);color:var(--ac)';all.textContent='전체';
    all.onclick=()=>{const k=tKey();Object.entries(blocks).forEach(([id,kw])=>{if(kw?.trim())getBigs(k,id).push({text:kw,done:false});});beforeSave();save();renderToday();chips.querySelectorAll('.ai-chip').forEach(c=>c.className='ai-chip ap');};
    chips.appendChild(all);
    Object.entries(blocks).forEach(([id,kw])=>{
      if(!kw?.trim())return;const sec=SECS.find(s=>s.id===id);if(!sec)return;
      const c=document.createElement('button');c.className='ai-chip';c.textContent=`${sec.name}: ${kw}`;
      c.onclick=()=>{getBigs(tKey(),id).beforeSave();push({text:kw,done:false});save();renderSecBody(id);updateTotal();c.className='ai-chip ap';};
      chips.appendChild(c);
    });
  }catch(e){res.textContent='오류가 발생했어요.';}
  btn.disabled=false;
}

// ═══════ WEEKLY ═══════
function renderWeekly(){
  const el=document.getElementById('weeklyView');
  const today=new Date(),dow=today.getDay();
  const dates=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-dow+i);return d;});
  const vis=SECS.filter(s=>ST.vis.includes(s.id));
  let h=`<div class="view-ttl">이번 주</div><div class="wscr"><div class="wkg">
    <div class="wh"></div>${dates.map((d,i)=>`<div class="wh${i===dow?' tc':''}">${DOW[d.getDay()]} ${d.getDate()}</div>`).join('')}`;
  vis.forEach(sec=>{
    h+=`<div class="wlbl" style="color:${sec.color}">${sec.name}</div>`;
    dates.forEach((d,di)=>{
      const k=`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
      const bigs=ST.days[k]?.big?.[sec.id]||[];const sms=ST.days[k]?.small?.[sec.id]||[];
      h+=`<div class="wc${di===dow?' tc':''}">`;
      bigs.slice(0,2).forEach(b=>{if(b.text)h+=`<div class="wbig${b.done?' done':''}">${esc(b.text)}</div>`;});
      sms.slice(0,2).forEach(s=>h+=`<div class="wsm${s.done?' done':''}">${esc(s.text)}</div>`);
      const more=(bigs.length>2?bigs.length-2:0)+(sms.length>2?sms.length-2:0);
      if(more)h+=`<div class="wmore">+${more}</div>`;
      h+='</div>';
    });
  });
  h+='</div></div>';el.innerHTML=h;
}

// ═══════ MONTHLY ═══════
function renderMonthly(){
  const el=document.getElementById('monthlyView');const{y,m}=mCur;const today=new Date();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  let h=`<div class="mnav"><button class="mnb" onclick="chM(-1)">‹</button><div class="mttl">${y}년 ${MONS[m]}</div><button class="mnb" onclick="chM(1)">›</button></div>
  <div class="mcg">${DOW.map(d=>`<div class="mcdow">${d}</div>`).join('')}${Array(fd).fill('<div class="mcc empty"></div>').join('')}`;
  for(let d=1;d<=dim;d++){
    const k=`${y}-${z(m+1)}-${z(d)}`;const day=ST.days[k];
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const bigs=SECS.flatMap(s=>day?.big?.[s.id]||[]).filter(b=>b.text?.trim());
    const smt=SECS.reduce((a,s)=>a+(day?.small?.[s.id]?.length||0),0);
    h+=`<div class="mcc${isT?' mct':''}"><div class="mcd">${d}</div>
      <div class="mcdots">${bigs.map((b,i)=>`<div class="mcdot${i>=6?' ov':''}${b.done?' dn':''}"></div>`).join('')}</div>
      ${smt?`<div class="mcsc">${smt}</div>`:''}
    </div>`;
  }
  h+='</div>';el.innerHTML=h;
}
function chM(dir){mCur.m+=dir;if(mCur.m<0){mCur.m=11;mCur.y--;}if(mCur.m>11){mCur.m=0;mCur.y++;}renderMonthly();}
